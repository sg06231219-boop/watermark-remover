<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>и§Ҷйў‘еҺ»ж°ҙеҚ°е·Ҙе…?В· дё“дёҡзү?/title>
<style>
/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•?*/
/* еҸҳйҮҸ & еҹәзЎҖ */
/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•?*/
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#080810; --surface:rgba(22,22,38,0.8); --surface2:rgba(30,30,50,0.7);
  --border:rgba(255,255,255,0.06); --border2:rgba(255,255,255,0.1);
  --text:#e8e8f0; --text2:#a0a0b8; --muted:#6a6a80;
  --accent:#7c3aed; --accent2:#a855f7; --accent3:#6366f1;
  --success:#22c55e; --danger:#ef4444; --warn:#f59e0b;
  --shadow:0 8px 32px rgba(0,0,0,0.4);
  --radius:16px; --radius-sm:10px;
  --font:'Inter',-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;
}
body{
  font-family:var(--font); background:var(--bg);
  color:var(--text); min-height:100vh;
  display:flex; align-items:center; justify-content:center;
  padding:20px 16px;
}
/* иғҢжҷҜеҠЁз”» */
body::before{
  content:''; position:fixed; inset:0; z-index:-1;
  background:
    radial-gradient(ellipse 80% 60% at 30% 20%, rgba(124,58,237,0.08) 0%, transparent 60%),
    radial-gradient(ellipse 60% 70% at 80% 80%, rgba(99,102,241,0.06) 0%, transparent 60%),
    radial-gradient(ellipse 50% 50% at 50% 50%, rgba(168,85,247,0.04) 0%, transparent 60%);
}
.container{width:100%;max-width:560px;position:relative;z-index:1}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•?*/
/* Header */
/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•?*/
.header{text-align:center;margin-bottom:28px}
.header .icon{font-size:56px;display:block;margin-bottom:10px;
  filter:drop-shadow(0 4px 12px rgba(124,58,237,0.3));}
.header h1{font-size:26px;font-weight:800;
  background:linear-gradient(135deg,var(--text),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;}
.header p{color:var(--text2);font-size:13px;margin-top:4px}
.platforms{display:flex;flex-wrap:wrap;gap:4px;justify-content:center;margin-top:10px}
.platform-tag{
  background:var(--surface2);border:1px solid var(--border);
  border-radius:20px;padding:3px 10px;font-size:11px;color:var(--text2);
  transition:all .2s;}
.platform-tag:hover{border-color:var(--accent3);color:var(--accent2)}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•?*/
/* Card йҖҡз”Ё */
/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•?*/
.card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:22px 20px;margin-bottom:14px;
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  box-shadow:var(--shadow);transition:all .3s;
}
.card-header{
  display:flex;align-items:center;gap:8px;margin-bottom:14px;
  font-size:13px;font-weight:600;color:var(--text2);
}
.card-header .dot{width:8px;height:8px;border-radius:50%;
  background:var(--accent);box-shadow:0 0 8px var(--accent);}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•?*/
/* иҫ“е…ҘеҢ?*/
/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•?*/
.mode-tabs{display:flex;gap:6px;margin-bottom:16px}
.mode-tab{
  flex:1;padding:9px 12px;border-radius:var(--radius-sm);
  background:var(--surface2);border:1px solid var(--border);
  color:var(--text2);font-size:13px;font-weight:500;
  cursor:pointer;text-align:center;transition:all .25s;
  font-family:var(--font);
}
.mode-tab:hover{border-color:var(--border2)}
.mode-tab.active{
  background:linear-gradient(135deg,rgba(124,58,237,0.2),rgba(99,102,241,0.15));
  border-color:var(--accent);color:var(--accent2);font-weight:600;
}

/* URL иҫ“е…Ҙ */
.url-wrap{position:relative;margin-bottom:12px}
.url-input{
  width:100%;background:var(--surface2);border:2px solid var(--border);
  border-radius:var(--radius-sm);padding:14px 14px 14px 46px;
  color:var(--text);font-size:14px;outline:none;transition:all .25s;
  font-family:var(--font);
}
.url-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(124,58,237,0.12)}
.url-input::placeholder{color:var(--muted)}
.url-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);
  font-size:18px;color:var(--muted);pointer-events:none}
.action-row{display:flex;gap:8px}
.btn{
  padding:11px 18px;border:none;border-radius:var(--radius-sm);
  font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;
  font-family:var(--font);display:flex;align-items:center;justify-content:center;
  gap:6px;white-space:nowrap;
}
.btn:active{transform:scale(0.97)}
.btn-primary{
  flex:1;background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;box-shadow:0 4px 16px rgba(124,58,237,0.35);
}
.btn-primary:hover{box-shadow:0 6px 24px rgba(124,58,237,0.5);transform:translateY(-1px)}
.btn-secondary{
  background:var(--surface2);color:var(--text);border:1px solid var(--border);
}
.btn-secondary:hover{border-color:var(--border2);background:rgba(255,255,255,0.04)}

/* дёҠдј еҢ?*/
.upload-zone{
  background:var(--surface2);border:2px dashed var(--border);
  border-radius:var(--radius-sm);padding:36px 20px;text-align:center;
  cursor:pointer;transition:all .3s;position:relative;
}
.upload-zone:hover,.upload-zone.drag{
  border-color:var(--accent);background:rgba(124,58,237,0.06);
}
.upload-zone .up-icon{font-size:42px;display:block;margin-bottom:8px;
  transition:transform .3s;}
.upload-zone:hover .up-icon{transform:translateY(-4px)}
.upload-zone p{color:var(--text);font-size:14px;font-weight:500}
.upload-zone small{color:var(--muted);font-size:11px;display:block;margin-top:4px}
.upload-zone.selected{border-style:solid;border-color:var(--accent)}
#fileInput{display:none}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•?*/
/* йў„и®ҫ + йў„и§Ҳ */
/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•?*/
.preset-row{display:flex;gap:6px;margin-bottom:10px}
.preset-btn{
  flex:1;padding:7px 4px;background:var(--surface2);border:1px solid var(--border);
  color:var(--text2);border-radius:8px;font-size:12px;cursor:pointer;
  transition:all .2s;font-family:var(--font);
}
.preset-btn:hover{border-color:var(--accent3)}
.preset-btn.active{background:rgba(124,58,237,0.2);border-color:var(--accent);
  color:var(--accent2);font-weight:600}

.preview-container{
  position:relative;background:#000;border-radius:var(--radius-sm);
  overflow:hidden;margin-bottom:10px;aspect-ratio:16/9;
  cursor:grab;
}
.preview-container:active{cursor:grabbing}
.preview-container canvas,.preview-container video{
  position:absolute;inset:0;width:100%;height:100%;object-fit:contain;
}
.wm-overlay{
  position:absolute;border:2px solid rgba(168,85,247,0.8);
  background:rgba(124,58,237,0.18);cursor:move;z-index:2;
  box-shadow:0 0 0 1px rgba(168,85,247,0.3), inset 0 0 40px rgba(124,58,237,0.08);
  transition:box-shadow .2s;
}
.wm-overlay:hover{box-shadow:0 0 0 3px rgba(168,85,247,0.4), inset 0 0 40px rgba(124,58,237,0.1)}
.wm-overlay::after{
  content:'ж°ҙеҚ°';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-size:12px;color:rgba(255,255,255,0.9);font-weight:700;pointer-events:none;
  text-shadow:0 1px 4px rgba(0,0,0,0.6);
}
.resize-handle{
  position:absolute;width:14px;height:14px;
  background:var(--accent2);border:2px solid #fff;
  border-radius:4px;z-index:3;box-shadow:0 2px 8px rgba(0,0,0,0.3);
}
.resize-handle.nw{top:-7px;left:-7px;cursor:nw-resize}
.resize-handle.ne{top:-7px;right:-7px;cursor:ne-resize}
.resize-handle.sw{bottom:-7px;left:-7px;cursor:sw-resize}
.resize-handle.se{bottom:-7px;right:-7px;cursor:se-resize}

.video-meta{display:flex;gap:12px;font-size:11px;color:var(--muted);flex-wrap:wrap}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•?*/
/* з®—жі• + з”»иҙЁ */
/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•?*/
.algo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px}
.algo-card{
  background:var(--surface2);border:2px solid var(--border);
  border-radius:var(--radius-sm);padding:12px 6px;cursor:pointer;
  text-align:center;color:var(--text);font-family:var(--font);
  font-size:12px;transition:all .25s;
}
.algo-card:hover{border-color:var(--border2);transform:translateY(-2px)}
.algo-card.active{
  border-color:var(--accent);background:rgba(124,58,237,0.12);
  box-shadow:0 0 20px rgba(124,58,237,0.2);
}
.algo-card .a-icon{font-size:22px;display:block;margin-bottom:4px}
.algo-card .a-name{font-weight:700;margin-bottom:2px}
.algo-card .a-speed{font-size:10px;color:var(--muted)}
.algo-card.active .a-name{color:var(--accent2)}
.algo-card.active .a-speed{color:var(--accent3)}

.quality-row{display:flex;gap:6px}
.quality-btn{
  flex:1;padding:8px 4px;background:var(--surface2);border:1px solid var(--border);
  border-radius:8px;color:var(--text2);font-size:12px;cursor:pointer;
  text-align:center;transition:all .2s;font-family:var(--font);
}
.quality-btn:hover{border-color:var(--border2)}
.quality-btn.active{
  border-color:var(--accent);background:rgba(124,58,237,0.15);
  color:var(--accent2);font-weight:600;
}
.quality-btn .q-dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:4px}
.quality-btn[data-q="fast"] .q-dot{background:var(--warn)}
.quality-btn[data-q="balanced"] .q-dot{background:var(--accent3)}
.quality-btn[data-q="high"] .q-dot{background:var(--accent2)}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•?*/
/* ејҖе§ӢжҢүй’?*/
/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•?*/
.start-btn{
  width:100%;padding:16px;border:none;border-radius:var(--radius);
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;font-size:16px;font-weight:800;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:all .25s;font-family:var(--font);
  box-shadow:0 6px 24px rgba(124,58,237,0.4);
  letter-spacing:.5px;
}
.start-btn:hover:not(:disabled){
  box-shadow:0 8px 32px rgba(124,58,237,0.55);transform:translateY(-2px)}
.start-btn:active:not(:disabled){transform:scale(0.98)}
.start-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•?*/
/* иҝӣеәҰ */
/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•?*/
.progress-card{display:none}
.progress-card.active{display:block}
.prog-header{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.prog-icon{font-size:30px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.prog-info{flex:1}
.prog-title{font-size:15px;font-weight:700}
.prog-sub{font-size:12px;color:var(--text2);margin-top:2px}
.prog-bar{
  height:8px;background:var(--surface2);border-radius:4px;
  overflow:hidden;margin-bottom:8px;
}
.prog-fill{
  height:100%;width:0;border-radius:4px;

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•?*/
function switchMode(m) {
  mode = m;
  document.querySelectorAll('.mode-tab').forEach(t =>
    t.classList.toggle('active', t.dataset.mode === m));
  document.getElementById('urlSection').style.display = m === 'url' ? 'block' : 'none';
  document.getElementById('uploadSection').style.display = m === 'upload' ? 'block' : 'none';
}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•?*/
/* еүӘиҙҙжқ?& URL еӨ„зҗҶ */
/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•?*/
async function pasteClipboard() {
  try {
    const text = await navigator.clipboard.readText();
    document.getElementById('urlInput').value = text;
    showToast('вң?е·ІзІҳиҙ?);
  } catch {
    document.getElementById('urlInput').focus();
    showToast('иҜ·жүӢеҠЁзІҳиҙҙй“ҫжҺ?);
  }
}

function processUrl() {
  const url = document.getElementById('urlInput').value.trim();
  if (!url) {
    showToast('иҜ·иҫ“е…Ҙи§Ҷйў‘й“ҫжҺ?);
    document.getElementById('urlInput').focus();
    return;
  }
  hasFile = false; selectedFile = null;
  startProcess();
}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•?*/
/* ж–Үд»¶дёҠдј  */
/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•?*/
function handleDrop(e) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag');
  const f = e.dataTransfer.files[0];
  if (f) handleFile(f);
}

function handleFile(file) {
  if (!file) return;
  selectedFile = file;
  hasFile = true;
  const zone = document.getElementById('uploadZone');
  zone.classList.add('selected');
  zone.querySelector('p').textContent = 'вң?' + file.name;
  zone.querySelector('small').textContent = formatSize(file.size);
  showVideoPreview(file);
}

function showVideoPreview(srcOrFile) {
  const container = document.getElementById('previewContainer');
  const video = document.createElement('video');
  video.muted = true; video.playsInline = true; video.preload = 'metadata';
  video.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;object-fit:contain;background:#000';

  if (typeof srcOrFile === 'string') {
    video.src = srcOrFile;
  } else {
    video.src = URL.createObjectURL(srcOrFile);
  }

  // жё…зҗҶж—§е…ғзҙ пјҲдҝқз•ҷ overlayпј?  const old = container.querySelectorAll('video,canvas:not(#previewCanvas)');
  old.forEach(e => e.remove());

  container.insertBefore(video, container.firstChild);

  video.onloadedmetadata = () => {
    videoInfo = {
      width: video.videoWidth,
      height: video.videoHeight,
      duration: video.duration,
    };
    // и·іиҪ¬еҲ?10% дҪҚзҪ®жҲӘеӣҫ
    const seekTo = Math.min(video.duration * 0.1, 3);
    if (seekTo < video.duration) {
      video.currentTime = seekTo;
    }
  };

  video.onseeked = () => {
    // з»ҳеҲ¶йқҷжҖҒйў„и§?    const canvas = document.getElementById('previewCanvas');
    canvas.style.display = 'block';
    const rect = container.getBoundingClientRect();
    canvas.width = rect.width;
    canvas.height = rect.height;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

    // е…ғдҝЎжҒ?    updateMeta();
    // жӣҙж–° overlay
    updateOverlay();
  };

  video.onerror = () => {
    videoInfo = {
      width: selectedFile ? 0 : 1920,
      height: selectedFile ? 0 : 1080,
      duration: 0,
    };
    updateMeta();
  };
}

function updateMeta() {
  const meta = document.getElementById('videoMeta');
  if (!videoInfo) {
    meta.innerHTML = '<span>рҹ“җ --</span><span>вҸ?--</span><span>рҹ“Ұ --</span>';
    return;
  }
  const { width, height, duration } = videoInfo;
  const dur = duration > 0
    ? `${Math.floor(duration/60)}:${String(Math.floor(duration%60)).padStart(2,'0')}`
    : '--:--';
  const size = selectedFile ? formatSize(selectedFile.size) : '--';
  meta.innerHTML = `
    <span>рҹ“җ ${width}Г—${height}</span>
    <span>вҸ?${dur}</span>
    <span>рҹ“Ұ ${size}</span>`;
}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•?*/
/* ж°ҙеҚ° overlay вҖ?жӢ–жӢҪ + зј©ж”ҫ */
/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•?*/
function applyPreset(id) {
  preset = id;
  wmRegion = { ...PRESETS[id] };
  document.querySelectorAll('.preset-btn').forEach(b =>
    b.classList.toggle('active', b.textContent.includes(id.replace('-',''))));
  updateOverlay();
}

function updateOverlay() {
  if (!videoInfo || !videoInfo.width) return;
  const overlay = document.getElementById('wmOverlay');
  const container = document.getElementById('previewContainer');
  const rect = container.getBoundingClientRect();
  const cW = rect.width, cH = rect.height;

  // и§Ҷйў‘еңЁе®№еҷЁдёӯзҡ„е®һйҷ…жҳҫзӨәеҢәеҹҹпјҲobject-fit:containпј?  const vAspect = videoInfo.width / videoInfo.height;
  const cAspect = cW / cH;
  let vW, vH, ox, oy;
  if (vAspect > cAspect) {
    vW = cW; vH = cW / vAspect; ox = 0; oy = (cH - vH) / 2;
  } else {
    vH = cH; vW = cH * vAspect; ox = (cW - vW) / 2; oy = 0;
  }

  const px = ox + wmRegion.x_frac * vW;
  const py = oy + wmRegion.y_frac * vH;
  const pw = wmRegion.w_frac * vW;
  const ph = wmRegion.h_frac * vH;

  overlay.style.left = px + 'px';
  overlay.style.top = py + 'px';
  overlay.style.width = pw + 'px';
  overlay.style.height = ph + 'px';
  overlay.style.display = 'block';
}

// в”Җв”Җ жӢ–жӢҪз§»еҠЁ в”Җв”Җ
let dragState = null;
const overlay = document.getElementById('wmOverlay');

overlay.addEventListener('mousedown', e => {
  if (e.target.classList.contains('resize-handle')) return;
  e.preventDefault();
  dragState = {
    type: 'move',
    startX: e.clientX, startY: e.clientY,
    origX: parseFloat(overlay.style.left),
    origY: parseFloat(overlay.style.top),
  };
});

document.querySelectorAll('.resize-handle').forEach(h => {
  h.addEventListener('mousedown', e => {
    e.preventDefault(); e.stopPropagation();
    dragState = {
      type: 'resize', dir: h.dataset.dir,
      startX: e.clientX, startY: e.clientY,
      origL: parseFloat(overlay.style.left),
      origT: parseFloat(overlay.style.top),
      origW: parseFloat(overlay.style.width),
      origH: parseFloat(overlay.style.height),
    };
  });
});

document.addEventListener('mousemove', e => {
  if (!dragState || !videoInfo) return;

  const container = document.getElementById('previewContainer');
  const rect = container.getBoundingClientRect();
  const cW = rect.width, cH = rect.height;
  const vAspect = videoInfo.width / videoInfo.height;
  const cAspect = cW / cH;
  let vW, vH, ox, oy;
  if (vAspect > cAspect) {
    vW = cW; vH = cW / vAspect; ox = 0; oy = (cH - vH) / 2;
  } else {
    vH = cH; vW = cH * vAspect; ox = (cW - vW) / 2; oy = 0;
  }

  const dx = e.clientX - dragState.startX;
  const dy = e.clientY - dragState.startY;

  if (dragState.type === 'move') {
    let nx = dragState.origX + dx;
    let ny = dragState.origY + dy;
    nx = Math.max(ox, Math.min(ox + vW - parseFloat(overlay.style.width), nx));
    ny = Math.max(oy, Math.min(oy + vH - parseFloat(overlay.style.height), ny));
    overlay.style.left = nx + 'px';
    overlay.style.top = ny + 'px';

    // еҸҚз®—жҜ”дҫӢ
    wmRegion.x_frac = (nx - ox) / vW;
    wmRegion.y_frac = (ny - oy) / vH;
  } else if (dragState.type === 'resize') {
    let nL = dragState.origL, nT = dragState.origT;
    let nW = dragState.origW, nH = dragState.origH;
    const dir = dragState.dir;

    if (dir.includes('e')) nW = Math.max(20, dragState.origW + dx);
    if (dir.includes('w')) { nW = Math.max(20, dragState.origW - dx); nL = dragState.origL + dx; }
    if (dir.includes('s')) nH = Math.max(10, dragState.origH + dy);
    if (dir.includes('n')) { nH = Math.max(10, dragState.origH - dy); nT = dragState.origT + dy; }

    // иҫ№з•ҢзәҰжқҹ
    nL = Math.max(ox, nL);
    nT = Math.max(oy, nT);
    if (nL + nW > ox + vW) nW = ox + vW - nL;
    if (nT + nH > oy + vH) nH = oy + vH - nT;

    overlay.style.left = nL + 'px';
    overlay.style.top = nT + 'px';
    overlay.style.width = nW + 'px';
    overlay.style.height = nH + 'px';

    wmRegion.x_frac = (nL - ox) / vW;
    wmRegion.y_frac = (nT - oy) / vH;
    wmRegion.w_frac = nW / vW;
    wmRegion.h_frac = nH / vH;
  }
});

document.addEventListener('mouseup', () => { dragState = null; });

// и§Ұж‘ёдәӢд»¶
overlay.addEventListener('touchstart', e => {
  if (e.target.classList.contains('resize-handle')) return;
  e.preventDefault();
  const t = e.touches[0];
  dragState = {
    type: 'move', startX: t.clientX, startY: t.clientY,
    origX: parseFloat(overlay.style.left), origY: parseFloat(overlay.style.top),
  };
});

document.addEventListener('touchmove', e => {
  if (!dragState || !videoInfo) return;
  const t = e.touches[0];
  const container = document.getElementById('previewContainer');
  const rect = container.getBoundingClientRect();
  const cW = rect.width, cH = rect.height;
  const vAspect = videoInfo.width / videoInfo.height;
  const cAspect = cW / cH;
  let vW, vH, ox, oy;
  if (vAspect > cAspect) {
    vW = cW; vH = cW / vAspect; ox = 0; oy = (cH - vH) / 2;
  } else {
    vH = cH; vW = cH * vAspect; ox = (cW - vW) / 2; oy = 0;
  }
  const dx = t.clientX - dragState.startX;
  const dy = t.clientY - dragState.startY;
  let nx = dragState.origX + dx;
  let ny = dragState.origY + dy;
  nx = Math.max(ox, Math.min(ox + vW - parseFloat(overlay.style.width), nx));
  ny = Math.max(oy, Math.min(oy + vH - parseFloat(overlay.style.height), ny));
  overlay.style.left = nx + 'px';
  overlay.style.top = ny + 'px';
  wmRegion.x_frac = (nx - ox) / vW;
  wmRegion.y_frac = (ny - oy) / vH;
});

document.addEventListener('touchend', () => { dragState = null; });

// зӘ—еҸЈзј©ж”ҫж—¶жӣҙж–?overlay
window.addEventListener('resize', () => {
  if (videoInfo) updateOverlay();
});

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•?*/
/* з®—жі• & з”»иҙЁ */
/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•?*/

}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•?*/
/* AI жҷәиғҪжЈҖжө?*/
/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•?*/
async function aiDetectWatermark() {
  const canvas = document.getElementById('previewCanvas');
  if (!canvas || canvas.style.display === 'none') {
    showToast('иҜ·е…ҲйҖүжӢ©и§Ҷйў‘ж–Үд»¶з”ҹжҲҗйў„и§Ҳ');
    return;
  }

  const btn = document.getElementById('aiDetectBtn');
  const btn2 = document.getElementById('aiDetectBtn2');
  const resultDiv = document.getElementById('aiResult');
  const box = document.getElementById('aiBox');

  // жҢүй’®еҸ?loading
  btn.disabled = true; btn2.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> AI жЈҖжөӢдёӯ...';
  btn2.innerHTML = '<span class="spinner"></span> жЈҖжөӢдёӯ...';
  resultDiv.classList.remove('active');

  try {
    // д»?canvas еҜјеҮә JPEG blob
    const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', 0.85));

    // жһ„йҖ?FormDataпјҲйҷ„еёҰи§Ҷйў‘е…ғдҝЎжҒҜпј?    const fd = new FormData();
    fd.append('frame', blob, 'frame.jpg');
    if (videoInfo) {
      fd.append('video_width', String(videoInfo.width || 0));
      fd.append('video_height', String(videoInfo.height || 0));
      fd.append('video_duration', String(videoInfo.duration || 0));
      fd.append('video_fps', String(videoInfo.fps || 30));
    }

    const r = await fetch('/api/ai/detect', { method: 'POST', body: fd });
    const data = await r.json();

    if (data.error) {
      showAIError(data.error);
      return;
    }

    // жҳҫзӨәз»“жһң
    const hasWm = data.has_watermark;
    const conf = data.confidence ? Math.round(data.confidence * 100) : 0;
    const wmType = data.type || 'жңӘзҹҘ';
    const typeLabel = { text: 'ж–Үеӯ—', logo: 'еӣҫж ҮLogo', mixed: 'з»„еҗҲ', transparent: 'еҚҠйҖҸжҳҺ' }[wmType] || wmType;

    let html = '<div style="margin-bottom:6px">';
    html += `<span class="ai-tag">${hasWm ? 'вң?жЈҖжөӢеҲ°ж°ҙеҚ°' : 'вҡ пёҸ жңӘжЈҖжөӢеҲ°'}</span>`;
    html += `<span class="ai-tag">${typeLabel}</span>`;
    html += `<span class="ai-tag">зҪ®дҝЎеә?${conf}%</span>`;
    html += '</div>';

    if (data.description) {
      html += `<div class="ai-desc">${data.description}</div>`;
    }

    // з®—жі•жҺЁиҚҗ
    if (data.recommendation) {
      const rec = data.recommendation;
      html += '<div class="ai-rec">';
      html += `<div>рҹ’Ў жҺЁиҚҗ: <strong>${rec.algorithm}</strong> В· <strong>${rec.quality}</strong></div>`;
      html += `<div class="ai-desc">${rec.reasoning || ''}</div>`;
      if (rec.tips && rec.tips.length) {
        html += '<div class="ai-desc" style="margin-top:4px">';
        html += rec.tips.map(t => 'В· ' + t).join('<br>');
        html += '</div>';
      }
      html += '</div>';

      // иҮӘеҠЁеә”з”Ёз®—жі•жҺЁиҚҗ
      if (rec.algorithm) {
        setAlgo(rec.algorithm);
        document.querySelectorAll('.algo-card').forEach(c =>
          c.classList.toggle('active', c.dataset.algo === rec.algorithm));
      }
      if (rec.quality) {
        setQuality(rec.quality);
        document.querySelectorAll('.quality-btn').forEach(b =>
          b.classList.toggle('active', b.dataset.q === rec.quality));
      }
    }

    box.innerHTML = html;
    resultDiv.classList.add('active');

    // иҮӘеҠЁи°ғж•ҙж°ҙеҚ°еҢәеҹҹ
    if (hasWm && data.x_frac !== undefined && data.y_frac !== undefined) {
      wmRegion = {
        x_frac: data.x_frac, y_frac: data.y_frac,
        w_frac: data.w_frac || 0.28, h_frac: data.h_frac || 0.11,
      };
      updateOverlay();
      showToast(`вң?е·Іе®ҡдҪҚж°ҙеҚ?(${conf}%зҪ®дҝЎеә?`);
    }

  } catch (e) {
    showAIError('зҪ‘з»ңжҲ?API ејӮеёё: ' + e.message);
  } finally {
    btn.disabled = false; btn2.disabled = false;
    btn.innerHTML = 'рҹӨ– AI жҷәиғҪжЈҖжө?;
    btn2.innerHTML = 'рҹ“· жҲӘеӣҫжЈҖжө?;
  }
}

function showAIError(msg) {
  const box = document.getElementById('aiBox');
  const resultDiv = document.getElementById('aiResult');
  box.innerHTML = `<div style="color:var(--danger)">вқ?${msg}</div>`;
  resultDiv.classList.add('active');
}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•?*/
/* ејҖе§ӢеӨ„зҗ?*/
/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•?*/
async function startProcess() {
      // д»ҳиҙ№еўҷпјҡе…Қиҙ№3ж¬ЎеҺ»ж°ҙеҚ°пјҢд№Ӣеҗ?.9е…ғж°ёд№?      if (!Paywall.tryUse('watermark', { price: '9.9', qrImg: 'img/donate-qr.png', desc: 'ж— йҷҗж¬Ўж•°еҺ»ж°ҙеҚ?В· AIжҷәиғҪжЈҖжө?В· еӨҡз§Қз®—жі•йҖүжӢ©', freeLimit: 3, contactWx: 'a5050e' })) return;
  const urlInput = document.getElementById('urlInput').value.trim();

  if (mode === 'url' && !urlInput) {
    showToast('иҜ·иҫ“е…Ҙи§Ҷйў‘й“ҫжҺ?);
    return;
  }
  if (mode === 'upload' && !selectedFile) {
    showToast('иҜ·йҖүжӢ©и§Ҷйў‘ж–Үд»¶');
    return;
  }

  // жҳҫзӨәиҝӣеәҰ
  document.getElementById('mainPanel').style.display = 'none';
  document.getElementById('progressCard').classList.add('active');
  document.getElementById('progTitle').textContent = 'жҸҗдәӨд»»еҠЎ...';
  document.getElementById('progSub').textContent = mode === 'url'
    ? urlInput.substring(0, 60) : selectedFile.name;
  document.getElementById('progFill').style.width = '2%';
  document.getElementById('progPct').textContent = '2%';

  try {
    if (mode === 'url') {
      // URL жЁЎејҸ
      await fetch('/api/process', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          url: urlInput,
          region: wmRegion,
          algorithm,
          quality,
        }),
      });
    } else {
      // дёҠдј жЁЎејҸ
      const fd = new FormData();
      fd.append('file', selectedFile);
      fd.append('region', JSON.stringify(wmRegion));
      fd.append('algorithm', algorithm);
      fd.append('quality', quality);

      // жҳҫзӨәдёҠдј иҝӣеәҰ
      document.getElementById('progTitle').textContent = 'дёҠдј и§Ҷйў‘...';
      document.getElementById('progSub').textContent = selectedFile.name;
      document.getElementById('progFill').style.width = '10%';
      document.getElementById('progPct').textContent = '10%';

      await fetch('/api/upload', {
        method: 'POST',
        body: fd,
      });
    }
    startPoll();
  } catch (e) {
    showError('зҪ‘з»ңиҝһжҺҘеӨұиҙҘ: ' + e.message);
  }
}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•?*/
/* иҝӣеәҰиҪ®иҜў */
/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•?*/
function startPoll() {
  clearInterval(pollTimer);
  let lastPct = 0;

  pollTimer = setInterval(async () => {
    try {
      const r = await fetch('/api/status');
      const s = await r.json();

      const pct = s.pct || 0;
      document.getElementById('progFill').style.width = pct + '%';
      document.getElementById('progPct').textContent = pct + '%';
      document.getElementById('progSub').textContent = s.msg || 'еӨ„зҗҶдё?..';

      // жӯҘйӘӨеӣҫж Ү
      const icons = s.step === 'downloading' ? 'рҹ“Ҙ'
        : s.step === 'uploaded' ? 'вң?
        : pct < 20 ? 'вҡҷпёҸ'
        : pct < 50 ? 'рҹ”§'
        : pct < 80 ? 'вң?
        : pct < 100 ? 'рҹҺ¬' : 'вң?;
      document.getElementById('progIcon').textContent = icons;

      if (s.err) {
        clearInterval(pollTimer);
        showError(s.err);
      } else if (s.step === 'done' && pct >= 100 && s.result) {
        clearInterval(pollTimer);
        showDone();
      }
    } catch {
      // з»§з»ӯзӯүеҫ…
    }
  }, 500);
}

function showDone() {
  document.getElementById('progressCard').classList.remove('active');
  document.getElementById('doneCard').classList.add('active');
}

function showError(msg) {
  clearInterval(pollTimer);
  document.getElementById('progressCard').classList.remove('active');
  document.getElementById('errorCard').classList.add('active');
  document.getElementById('errorMsg').textContent =
    msg || 'еӨ„зҗҶеӨұиҙҘпјҢиҜ·жЈҖжҹҘи§Ҷйў‘й“ҫжҺҘжҲ–е°қиҜ•жӣҙжҚўи§Ҷйў‘';
}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•?*/
/* йҮҚзҪ® */
/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•?*/
function resetAll() {
  clearInterval(pollTimer);
  selectedFile = null; hasFile = false; videoInfo = null;

  document.getElementById('progressCard').classList.remove('active');
  document.getElementById('doneCard').classList.remove('active');
  document.getElementById('errorCard').classList.remove('active');
  document.getElementById('mainPanel').style.display = 'block';

  document.getElementById('urlInput').value = '';
  document.getElementById('urlInput').placeholder = 'зІҳиҙҙи§Ҷйў‘й“ҫжҺҘпјҢеҰӮ https://v.douyin.com/xxx';
  document.getElementById('fileInput').value = '';
  const zone = document.getElementById('uploadZone');
  zone.classList.remove('selected');
  zone.querySelector('p').textContent = 'зӮ№еҮ»йҖүжӢ©жҲ–жӢ–жӢҪи§Ҷйў‘еҲ°жӯӨеӨ„';
  zone.querySelector('small').textContent = 'ж”ҜжҢҒ MP4 В· MOV В· AVI В· MKV В· WebM В· FLVпјҲжңҖеӨ?2GBпј?;

  // жҒўеӨҚ overlay
  document.getElementById('wmOverlay').style.display = 'none';
  document.getElementById('previewCanvas').style.display = 'none';
  document.getElementById('videoMeta').innerHTML = '<span>рҹ“җ --</span><span>вҸ?--</span><span>рҹ“Ұ --</span>';
}

function afterDownload() { setTimeout(resetAll, 1000); }

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•?*/
/* е·Ҙе…·еҮҪж•° */
/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•?*/
function formatSize(bytes) {
  if (!bytes) return '--';
  return bytes > 1e9 ? (bytes/1e9).toFixed(1) + ' GB'
    : bytes > 1e6 ? (bytes/1e6).toFixed(1) + ' MB'
    : (bytes/1e3).toFixed(0) + ' KB';
}

let toastTimer;
function showToast(msg) {
  let el = document.getElementById('toast');
  if (!el) {
    el = document.createElement('div');
    el.id = 'toast';
    el.style.cssText = `
      position:fixed;bottom:40px;left:50%;transform:translateX(-50%);
      background:rgba(30,30,50,.95);color:#e8e8f0;padding:10px 24px;
      border-radius:24px;font-size:13px;font-weight:600;z-index:999;
      border:1px solid rgba(255,255,255,.1);
      backdrop-filter:blur(12px);box-shadow:0 4px 20px rgba(0,0,0,.5);
      transition:opacity .3s;opacity:0;pointer-events:none;
    `;
    document.body.appendChild(el);
  }
  el.textContent = msg; el.style.opacity = '1';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.style.opacity = '0'; }, 2000);
}

/* дёҠдј еҢәзӮ№еҮ?*/
document.getElementById('uploadZone').addEventListener('click', () => {
  document.getElementById('fileInput').click();
});
